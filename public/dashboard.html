<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Админ-панель</title>
    <style>
        body { font-family: Arial; background: #eef2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        button, .btn { background: #1e6f5c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .delete { background: #c0392b; }
        .edit { background: #f39c12; }
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .form-group { margin: 10px 0; }
        input, select { padding: 6px; margin: 4px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 400px; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <span>Администратор</span>
        <div><button onclick="changePassword()">Сменить пароль</button> <button onclick="logout()">Выйти</button></div>
    </div>
    <h2>Создать диплом</h2>
    <form id="createForm">
        <input type="text" name="full_name" placeholder="ФИО" required>
        <input type="text" name="grade" placeholder="Класс" required>
        <input type="text" name="school" placeholder="Учебное заведение" required>
        <input type="text" name="olympiad_name" placeholder="Олимпиада" value="Отраслевая олимпиада школьников «Газпром»" required>
        <input type="text" name="profile" placeholder="Профиль" value="математика" required>
        <input type="text" name="level" placeholder="Уровень" value="3" required>
        <input type="text" name="number_in_list" placeholder="Номер в Перечне" value="1" required>
        <select name="degree">
            <option>Победитель</option><option>Призёр</option><option>Диплом I степени</option><option>Диплом II степени</option><option>Диплом III степени</option>
        </select>
        <button type="submit">Создать</button>
    </form>
    <hr>
    <h2>Список дипломов</h2>
    <table id="diplomasTable">
        <thead><tr><th>ID</th><th>ФИО</th><th>Класс</th><th>Олимпиада</th><th>Код</th><th>PDF</th><th>Действия</th></tr></thead>
        <tbody></tbody>
    </table>
    <hr>
    <h3>Экспорт / Импорт БД</h3>
    <button onclick="exportDB()">Скачать database.sqlite</button>
    <input type="file" id="importFile" accept=".sqlite">
    <button onclick="importDB()">Заменить базу данных</button>
    <p style="color:red">Импорт полностью заменит текущую БД!</p>
</div>
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Редактировать диплом</h3>
        <form id="editForm">
            <input type="hidden" id="editId">
            <input type="text" id="edit_full_name" placeholder="ФИО" required><br>
            <input type="text" id="edit_grade" placeholder="Класс" required><br>
            <input type="text" id="edit_school" placeholder="Учебное заведение" required><br>
            <input type="text" id="edit_olympiad_name" placeholder="Олимпиада" required><br>
            <input type="text" id="edit_profile" placeholder="Профиль" required><br>
            <input type="text" id="edit_level" placeholder="Уровень" required><br>
            <input type="text" id="edit_number_in_list" placeholder="Номер в Перечне" required><br>
            <select id="edit_degree">
                <option>Победитель</option><option>Призёр</option><option>Диплом I степени</option><option>Диплом II степени</option><option>Диплом III степени</option>
            </select><br><br>
            <button type="submit">Сохранить</button>
            <button type="button" onclick="closeModal()">Отмена</button>
        </form>
    </div>
</div>
<script>
    async function loadDiplomas() {
        const res = await fetch('/api/diplomas');
        if (!res.ok) { window.location.href = '/admin_login.html'; return; }
        const diplomas = await res.json();
        const tbody = document.querySelector('#diplomasTable tbody');
        tbody.innerHTML = '';
        diplomas.forEach(d => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = d.id;
            row.insertCell(1).innerText = d.full_name;
            row.insertCell(2).innerText = d.grade;
            row.insertCell(3).innerText = d.olympiad_name;
            row.insertCell(4).innerText = d.unique_code;
            row.insertCell(5).innerHTML = `<a href="/api/diploma/${d.id}/pdf" target="_blank">Скачать PDF</a>`;
            const actions = row.insertCell(6);
            actions.innerHTML = `<button class="edit" onclick="editDiploma(${d.id})">Ред</button>
                                 <button class="delete" onclick="deleteDiploma(${d.id})">Удл</button>`;
        });
    }
    document.getElementById('createForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        await fetch('/api/diplomas', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        e.target.reset();
        loadDiplomas();
    });
    window.editDiploma = async (id) => {
        const res = await fetch('/api/diplomas');
        const diplomas = await res.json();
        const d = diplomas.find(d => d.id == id);
        document.getElementById('editId').value = d.id;
        document.getElementById('edit_full_name').value = d.full_name;
        document.getElementById('edit_grade').value = d.grade;
        document.getElementById('edit_school').value = d.school;
        document.getElementById('edit_olympiad_name').value = d.olympiad_name;
        document.getElementById('edit_profile').value = d.profile;
        document.getElementById('edit_level').value = d.level;
        document.getElementById('edit_number_in_list').value = d.number_in_list;
        document.getElementById('edit_degree').value = d.degree;
        document.getElementById('editModal').style.display = 'flex';
    };
    document.getElementById('editForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const data = {
            full_name: document.getElementById('edit_full_name').value,
            grade: document.getElementById('edit_grade').value,
            school: document.getElementById('edit_school').value,
            olympiad_name: document.getElementById('edit_olympiad_name').value,
            profile: document.getElementById('edit_profile').value,
            level: document.getElementById('edit_level').value,
            number_in_list: document.getElementById('edit_number_in_list').value,
            degree: document.getElementById('edit_degree').value
        };
        await fetch(`/api/diplomas/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        closeModal();
        loadDiplomas();
    });
    window.deleteDiploma = async (id) => {
        if (confirm('Удалить диплом?')) {
            await fetch(`/api/diplomas/${id}`, { method: 'DELETE' });
            loadDiplomas();
        }
    };
    function closeModal() { document.getElementById('editModal').style.display = 'none'; }
    async function changePassword() {
        const old = prompt('Старый пароль');
        const newPass = prompt('Новый пароль');
        if (old && newPass) {
            const res = await fetch('/api/change-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ old_password: old, new_password: newPass }) });
            if (res.ok) alert('Пароль изменён');
            else alert('Ошибка');
        }
    }
    async function logout() {
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = '/admin_login.html';
    }
    function exportDB() { window.location.href = '/api/export-db'; }
    async function importDB() {
        const fileInput = document.getElementById('importFile');
        if (!fileInput.files[0]) return alert('Выберите файл');
        const formData = new FormData();
        formData.append('dbFile', fileInput.files[0]);
        const res = await fetch('/api/import-db', { method: 'POST', body: formData });
        if (res.ok) { alert('База заменена, перезагрузите страницу'); location.reload(); }
        else alert('Ошибка импорта');
    }
    loadDiplomas();
</script>
</body>
</html>
